project_title: "MAPLE (Multi-Agent Protein Learning Engine)"
project_description: "MAPLE is a multi-agent system that autonomously explores protein sequence space and optimizes enzyme function through iterative learning."

seed: 42
seed_sequence: "MKTFFVAVLGLCLLSQAS"
num_iterations: 5

runtime:
  num_candidates: 10
  top_k: 3
  mutation_rate: 1
  selection_strategy: "diverse"
  min_hamming_distance: 2
  w_stability: 0.45
  w_activity: 0.45
  w_uncertainty: 0.10

model:
  embedding_dim: 128
  structure_backend: "dummy"
  esmfold_command: "python3 scripts/run_esmfold_adapter.py --sequence-file {sequence_file} --output-file {output_file} --allow-mock"
  alphafold2_command: ""
  structure_timeout_sec: 120
  structure_retries: 1
  property_checkpoint: ""
  uncertainty_samples: 5
  uncertainty_noise: 0.02
