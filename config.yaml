project_title: "MAPLE (Multi-Agent Protein Learning Engine)"
project_description: "MAPLE is a multi-agent system that autonomously explores protein sequence space and optimizes enzyme function through iterative learning."

seed: 42
seed_sequence: "MKTFFVAVLGLCLLSQAS"
num_iterations: 5

runtime:
  num_candidates: 10
  top_k: 3
  mutation_rate: 1
  selection_strategy: "diverse"
  min_hamming_distance: 2
  bo_beta: 0.30
  bo_trials_per_parent: 8

  scoring_preset: "balanced"
  use_weight_preset: true
  normalize_score_weights: true

  constraint_enabled: false
  constraint_mode: "hard"
  constraint_penalty: 0.20
  min_stability: null
  min_activity: null
  min_structure_confidence: null
  min_plddt: null
  min_ptm: null
  max_pae: null

  w_stability: 0.35
  w_activity: 0.35
  w_uncertainty: 0.10
  w_structure: 0.10
  w_plddt: 0.05
  w_ptm: 0.03
  w_pae: 0.02

model:
  embedding_dim: 128
  structure_backend: "esmfold"
  esmfold_command: "python3 scripts/run_esmfold_adapter.py --sequence-file {sequence_file} --output-file {output_file} --allow-mock"
  alphafold2_command: ""
  structure_timeout_sec: 120
  structure_retries: 1
  structure_strict: false
  structure_batch_size: 16
  property_checkpoint: ""
  uncertainty_samples: 5
  uncertainty_noise: 0.02
